name: Verify content secret (temporary)

on:
  push:
    branches: ["devin/1782821481-auto-content"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run feed script (no commit) to verify ENSEMBLE_API_KEY
        env:
          ENSEMBLE_API_KEY: ${{ secrets.ENSEMBLE_API_KEY }}
        run: |
          if [ -z "$ENSEMBLE_API_KEY" ]; then echo "ENSEMBLE_API_KEY MISSING"; exit 1; fi
          echo "ENSEMBLE_API_KEY present (length ${#ENSEMBLE_API_KEY})"
          node scripts/update-feed.mjs
          echo "feed items: $(node -e "console.log(require('./data/feed.json').count)")"
